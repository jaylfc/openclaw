name: Sync upstream main

# Keeps the fork's `main` branch in lockstep with
# `openclaw/openclaw:main`. Runs Monday 09:00 UTC and on-demand.
#
# `main` carries one fork-only file (this workflow), so it has
# permanently diverged from upstream and we cannot use `--ff-only`.
# Instead we merge upstream in. Upstream never touches our workflow
# file, so the merge is always trivial — if a real conflict ever shows
# up the workflow fails loudly for a human to investigate.
#
# The long-lived `taos-fork` branch is NOT touched here. That branch
# carries the taOS bridge + release wiring and needs manual review
# when pulling upstream in.

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "jaylfc"
          git config user.email "jaylfc25@gmail.com"

      - name: Merge upstream/main into fork main
        run: |
          git remote add upstream https://github.com/openclaw/openclaw.git
          git fetch upstream main --depth=500
          before=$(git rev-parse HEAD)
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "main already contains upstream/main ($before)"
            exit 0
          fi
          # Non-interactive merge. `--no-edit` accepts default commit message.
          # `--no-ff` is not set — if a fast-forward IS possible (e.g. the
          # workflow file alone on main hasn't moved) git will take it.
          git merge upstream/main --no-edit
          after=$(git rev-parse HEAD)
          echo "synced main: $before -> $after"
          git push origin main
